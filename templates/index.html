<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en" class="bg-gray-900 text-white">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FastDL4U - Download Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.3.2/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="p-6">
  <div class="max-w-4xl mx-auto">
    <h1 class="text-3xl font-bold mb-4">📥 FastDL4U - Downloader</h1>
    
    <form id="downloadForm" class="mb-6">
      <div class="flex items-center gap-4">
        <input id="urlInput" name="url" type="url" required
          placeholder="Paste media link here..."
          class="flex-1 p-3 rounded-lg bg-gray-800 text-white border border-gray-700"/>
        <button type="submit"
          class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg text-white font-semibold">Download</button>
      </div>
    </form>

    <h2 class="text-xl font-semibold mb-2">📁 Downloads</h2>
    <div class="space-y-4">
      {% for file in files[::-1] %}
        <div class="p-4 bg-gray-800 rounded-lg shadow flex items-center justify-between">
          <div>
            <h3 class="text-lg font-bold">{{ file.title }}</h3>
            <p class="text-sm text-gray-400">{{ file.file }}</p>
          </div>
          <div class="flex gap-2">
            <a href="/play/{{ file.file }}" class="bg-green-600 hover:bg-green-700 px-3 py-1 rounded text-sm">▶ Play</a>
            <a href="{{ file.url }}" download class="bg-blue-600 hover:bg-blue-700 px-3 py-1 rounded text-sm">⬇ Download</a>
            <a href="/delete/{{ file.file }}" class="bg-red-600 hover:bg-red-700 px-3 py-1 rounded text-sm">🗑 Delete</a>
          </div>
        </div>
      {% endfor %}
    </div>
  </div>

  <script>
    const form = document.getElementById("downloadForm");
    const input = document.getElementById("urlInput");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const url = input.value;
      const res = await fetch("/api/download", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url }),
      });
      const data = await res.json();
      alert(data.success ? "✅ Download started!" : "❌ Error: " + data.message);
      location.reload();
    });
  </script>
</body>
</html>
