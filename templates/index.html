<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Social Media Downloader</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
  <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-md p-6">
    <h1 class="text-2xl font-bold mb-4 text-center">📥 Social Media Downloader</h1>

    <form id="downloadForm" class="space-y-4">
      <input type="text" id="link" placeholder="Paste video/audio link..." class="w-full p-2 border rounded" required>

      <div class="flex gap-4">
        <label class="flex items-center">
          <input type="radio" name="format" value="video" checked class="mr-2"> Video
        </label>
        <label class="flex items-center">
          <input type="radio" name="format" value="audio" class="mr-2"> Audio
        </label>
      </div>

      <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
        🚀 Process
      </button>
    </form>

    <div id="result" class="mt-6 hidden">
      <img id="thumb" src="" alt="Thumbnail" class="w-full rounded mb-2">
      <p><strong>Title:</strong> <span id="title"></span></p>
      <p><strong>Duration:</strong> <span id="duration"></span> sec</p>
      <p><strong>Size:</strong> <span id="size"></span> MB</p>
      <p><strong>Quality:</strong> <span id="quality"></span></p>

      <div class="flex gap-3 mt-4">
        <a id="playBtn" href="#" target="_blank" class="bg-green-600 text-white px-4 py-2 rounded">▶ Play</a>
        <a id="downloadBtn" href="#" download class="bg-yellow-500 text-white px-4 py-2 rounded">⬇ Download</a>
        <a id="sendBtn" href="#" class="bg-purple-600 text-white px-4 py-2 rounded">📤 Send to Bot</a>
        <a id="deleteBtn" href="#" class="bg-red-600 text-white px-4 py-2 rounded">❌ Delete</a>
      </div>
    </div>

    <p id="loading" class="text-center mt-6 hidden text-blue-600 font-semibold">Processing... Please wait ⏳</p>
    <p id="error" class="text-red-600 mt-4 hidden">❌ Error: Something went wrong!</p>
  </div>

  <script>
    document.getElementById("downloadForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const link = document.getElementById("link").value;
      const format = document.querySelector('input[name="format"]:checked').value;

      document.getElementById("loading").classList.remove("hidden");
      document.getElementById("result").classList.add("hidden");
      document.getElementById("error").classList.add("hidden");

      try {
        const res = await fetch("/api/process", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ link, format }),
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Unknown error");

        document.getElementById("thumb").src = data.thumbnail;
        document.getElementById("title").textContent = data.title;
        document.getElementById("duration").textContent = data.duration || "N/A";
        document.getElementById("size").textContent = data.size || "N/A";
        document.getElementById("quality").textContent = data.quality || "N/A";

        document.getElementById("playBtn").href = data.file_url;
        document.getElementById("downloadBtn").href = data.file_url;
        document.getElementById("sendBtn").href = `https://t.me/share/url?url=${encodeURIComponent(data.file_url)}&text=${encodeURIComponent(data.title)}`;
        document.getElementById("deleteBtn").href = "#"; // You can add delete logic later

        document.getElementById("result").classList.remove("hidden");
      } catch (err) {
        document.getElementById("error").textContent = "❌ Error: " + err.message;
        document.getElementById("error").classList.remove("hidden");
      }

      document.getElementById("loading").classList.add("hidden");
    });
  </script>
</body>
</html>
