<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Social Media Downloader</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-800 p-6">
  <div class="max-w-xl mx-auto bg-white rounded-xl shadow-md p-6">
    <h1 class="text-2xl font-bold mb-4 text-center">📥 Social Media Downloader</h1>

    <form id="download-form" class="flex flex-col gap-4">
      <input type="text" name="link" placeholder="Paste video or audio URL..." class="p-2 border rounded" required>
      <select name="format" class="p-2 border rounded">
        <option value="video">🎥 Video</option>
        <option value="audio">🎵 Audio</option>
      </select>
      <button type="submit" class="bg-blue-500 text-white py-2 px-4 rounded hover:bg-blue-600">Process</button>
    </form>

    <div id="result" class="mt-6 space-y-3"></div>
  </div>

  <script>
    document.getElementById('download-form').onsubmit = async function(e) {
      e.preventDefault();
      const form = new FormData(e.target);
      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = '<p class="text-blue-500">⏳ Processing...</p>';

      const res = await fetch('/api/process', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          link: form.get('link'),
          format: form.get('format')
        })
      });

      const data = await res.json();
      resultDiv.innerHTML = `
        <div class="p-4 border rounded bg-gray-50">
          <h3 class="text-lg font-semibold">${data.title}</h3>
          <p>🕒 ${data.duration}</p>
          <p>📦 ${data.size}</p>
          <p>🔊 ${data.quality}</p>
          <img src="${data.thumbnail}" alt="Thumbnail" class="w-full rounded my-2">
          <div class="flex gap-4 mt-2">
            <a href="${data.file_url}" target="_blank" class="text-blue-600 underline">▶ Play</a>
            <a href="${data.file_url}" download class="text-green-600 underline">⬇ Download</a>
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
