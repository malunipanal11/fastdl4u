<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Social Downloader</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="font-family: sans-serif; padding: 2rem;">
  <h1>📥 Social Media Downloader</h1>
  <form id="download-form">
    <input type="text" name="link" placeholder="Paste video/audio link..." style="width: 80%;" required>
    <select name="format">
      <option value="video">🎥 Video</option>
      <option value="audio">🎵 Audio</option>
    </select>
    <button type="submit">Process</button>
  </form>

  <div id="result" style="margin-top: 2rem;"></div>

  <script>
    document.getElementById('download-form').onsubmit = async function(e) {
      e.preventDefault();
      const form = new FormData(e.target);
      const res = await fetch('/api/process', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          link: form.get('link'),
          format: form.get('format')
        })
      });
      const data = await res.json();
      document.getElementById('result').innerHTML = `
        <h3>${data.title}</h3>
        <p>Duration: ${data.duration}</p>
        <p>Quality: ${data.quality}</p>
        <p>Size: ${data.size}</p>
        <a href="${data.file_url}" target="_blank">⬇ Download / ▶ Play</a>
      `;
    }
  </script>
</body>
</html>
