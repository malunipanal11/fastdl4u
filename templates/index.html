<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Social Media Downloader</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">
  <div class="max-w-xl mx-auto p-6">
    <h1 class="text-3xl font-bold mb-4 text-center">📥 Social Media Downloader</h1>

    <form id="downloadForm" class="space-y-4">
      <input
        type="url"
        name="url"
        placeholder="Paste media link here..."
        class="w-full p-3 border rounded-lg focus:outline-none focus:ring focus:border-blue-300"
        required
      />
      <div class="flex gap-4">
        <button
          type="submit"
          class="flex-1 bg-blue-600 text-white py-2 px-4 rounded hover:bg-blue-700 transition"
        >
          Download
        </button>
      </div>
    </form>

    <div id="status" class="mt-6 hidden p-4 bg-white rounded shadow">
      <div class="mb-2 text-lg font-semibold">🔄 Processing...</div>
      <progress id="progressBar" value="0" max="100" class="w-full h-3"></progress>
      <div id="progressText" class="text-sm mt-2 text-gray-600">Starting...</div>
    </div>

    <div id="result" class="mt-6 hidden p-4 bg-white rounded shadow">
      <h2 class="text-xl font-semibold mb-2">✅ File Ready</h2>
      <video id="videoPlayer" controls class="w-full rounded"></video>
      <div class="flex flex-wrap gap-2 mt-4">
        <a id="playBtn" target="_blank" class="bg-green-500 text-white px-3 py-2 rounded hover:bg-green-600">▶️ Play</a>
        <a id="downloadBtn" target="_blank" class="bg-blue-500 text-white px-3 py-2 rounded hover:bg-blue-600">⬇️ Download</a>
        <button id="sendBtn" class="bg-purple-500 text-white px-3 py-2 rounded hover:bg-purple-600">📤 Send to Telegram</button>
        <button id="deleteBtn" class="bg-red-500 text-white px-3 py-2 rounded hover:bg-red-600">🗑️ Delete</button>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('downloadForm');
    const statusBox = document.getElementById('status');
    const resultBox = document.getElementById('result');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');
    const videoPlayer = document.getElementById('videoPlayer');
    const playBtn = document.getElementById('playBtn');
    const downloadBtn = document.getElementById('downloadBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const url = form.url.value.trim();
      if (!url) return;

      statusBox.classList.remove('hidden');
      resultBox.classList.add('hidden');
      progressBar.value = 10;
      progressText.innerText = 'Downloading...';

      try {
        const res = await fetch('/api/download', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url }),
        });

        const data = await res.json();
        if (!data.success) throw new Error(data.message);

        progressBar.value = 100;
        progressText.innerText = 'Done!';
        resultBox.classList.remove('hidden');

        videoPlayer.src = data.file_url;
        playBtn.href = data.file_url;
        downloadBtn.href = data.file_url;

      } catch (err) {
        progressText.innerText = 'Error: ' + err.message;
      }
    });
  </script>
</body>
</html>
