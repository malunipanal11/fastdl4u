services:
  - type: web
    name: fastdl4u
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn bot.main:app --host=0.0.0.0 --port=10000
    envVars:
      - key: MEGA_EMAIL
        value: your_mega_email@example.com
      - key: MEGA_PASSWORD
        value: your_mega_password
    plan: free
